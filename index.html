<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Mhub Employee Forms</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #e6f2fa;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 420px;
      margin: 30px auto;
      padding: 20px;
      background: #fafafa;
      border-radius: 8px;
    }

    .logo {
      display: block;
      max-width: 260px;
      width: 100%;
      height: auto;
      line-height: 0;
      margin: -30px auto -26px;
    }

    h1 {
      text-align: center;
      margin-top: 4px;
      margin-bottom: 20px;
      color: #003b66;
    }

    h3 {
      margin-top: 30px;
      margin-bottom: 10px;
      font-size: 18px;
      color: #003b66;
      border-bottom: 1px solid #ddd;
      padding-bottom: 5px;
    }

    a.button {
      display: block;
      padding: 16px;
      margin: 12px 0;
      text-align: center;
      background-color: #005f9e;
      color: white;
      text-decoration: none;
      font-size: 18px;
      border-radius: 6px;
    }

    a.button:hover {
      background-color: #004a7a;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Logo -->
    <img src="Fastenal-Logo.wine.png" alt="Mhub Logo" class="logo">

    <!-- Main Title -->
    <h1>Mhub Employee Forms</h1>

    <!-- Inspections -->
    <h3>Inspections</h3>
    <a class="button" href="https://app.smartsheet.com/b/form/988f2ba75e0941c7b9a08c2d96b3b94b">
      PIV Inspection
    </a>

    <a class="button" href="https://app.smartsheet.com/b/form/7c22690ed2b24452a2ff26709dedf6cb">
      Harness / Lanyard Inspection
    </a>

    <!-- Observations -->
    <h3>Observations</h3>
    <a class="button" href="https://app.smartsheet.com/b/form/c3bdb49cbd1f4f51b871729fab6f0eb2">
      Near Miss
    </a>

    <a class="button" href="https://app.smartsheet.com/b/form/85b02782abd04e1583f3619cbb7d58a8">
      JSO
    </a>

    <a class="button" href="https://app.smartsheet.com/b/form/019c58b8c0387a5db4fd5d70a77b289a">
      Observe the Observer
    </a>

    <a class="button" href="https://app.smartsheet.com/b/form/019d072fe32675a79e116e0958b08444">
      Safety Observation
    </a>

    <!-- Requests -->
    <h3>Requests</h3>
    <a class="button" href="https://app.smartsheet.com/b/form/0376a0d855674a3d8b023ef3ac642ac6">
      PT Time Off Request
    </a>

  </div>
</body>
</html>
